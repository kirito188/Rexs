<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Little World 🌻</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream: #fdf6ec;
    --warm-white: #fffaf3;
    --sand: #e8d9c0;
    --caramel: #c8a97e;
    --brown: #8b6445;
    --deep-brown: #5c3d2e;
    --dusty-rose: #d4a5a5;
    --sage: #9aab89;
    --muted-gold: #c9a84c;
    --text: #3d2b1f;
    --text-light: #7a5c46;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background-color: var(--cream);
    font-family: 'Lora', serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,169,126,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(154,171,137,0.15) 0%, transparent 60%);
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; opacity:0.6;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position:fixed; inset:0; z-index:999;
    background:var(--cream);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .login-box {
    background:var(--warm-white);
    border:1.5px solid var(--sand);
    border-radius:20px;
    padding:36px 30px;
    max-width:420px; width:100%;
    box-shadow:0 8px 40px rgba(139,100,69,0.12);
    animation:fadeUp 0.4s ease both;
  }
  .login-box .flower { font-size:2.4rem; text-align:center; margin-bottom:10px; }
  .login-box h2 {
    font-family:'Playfair Display',serif;
    font-size:1.5rem; color:var(--deep-brown);
    text-align:center; margin-bottom:6px;
  }
  .login-box p { font-size:0.82rem; color:var(--text-light); margin-bottom:24px; text-align:center; line-height:1.6; }
  .login-field { margin-bottom:14px; }
  .login-field label { display:block; font-size:0.78rem; color:var(--text-light); margin-bottom:5px; letter-spacing:0.02em; }
  .login-field input {
    width:100%; font-family:'Lora',serif; font-size:0.88rem;
    border:1.5px solid var(--sand); border-radius:10px;
    padding:10px 14px; background:var(--cream); color:var(--text); outline:none;
    transition:border-color 0.2s;
  }
  .login-field input:focus { border-color:var(--caramel); }
  .login-btn {
    width:100%; background:linear-gradient(135deg,var(--caramel),var(--brown));
    color:white; border:none; border-radius:12px;
    padding:12px; font-family:'Lora',serif; font-size:0.95rem;
    cursor:pointer; margin-top:8px; transition:opacity 0.2s;
    letter-spacing:0.03em;
  }
  .login-btn:hover { opacity:0.88; }

  /* ── HEADER ── */
  header {
    position:sticky; top:0; z-index:100;
    background:rgba(253,246,236,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1.5px solid var(--sand);
    padding:14px 28px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 2px 18px rgba(139,100,69,0.07);
  }
  .logo { font-family:'Playfair Display',serif; font-size:1.45rem; color:var(--deep-brown); }
  .logo span { color:var(--caramel); font-style:italic; }
  nav { display:flex; gap:6px; }
  nav button {
    background:none; border:none; cursor:pointer;
    font-family:'Lora',serif; font-size:0.82rem;
    color:var(--text-light); padding:7px 14px;
    border-radius:20px; transition:all 0.2s;
  }
  nav button:hover, nav button.active { background:var(--sand); color:var(--deep-brown); }

  /* ── USER BAR ── */
  #user-bar {
    background:var(--warm-white); border-bottom:1px solid var(--sand);
    padding:10px 28px; display:flex; align-items:center; gap:12px;
    font-size:0.82rem; color:var(--text-light);
  }
  #user-bar strong { color:var(--deep-brown); font-family:'Playfair Display',serif; }
  .room-badge {
    background:var(--sand); color:var(--brown);
    padding:3px 10px; border-radius:20px; font-size:0.72rem;
  }
  #live-badge {
    margin-left:auto; font-size:0.72rem;
    color:var(--sage); display:flex; align-items:center; gap:4px;
  }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--sage); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── MAIN ── */
  main { max-width:680px; margin:0 auto; padding:32px 20px 80px; position:relative; z-index:1; }

  .section-label {
    font-family:'Playfair Display',serif; font-size:1.25rem;
    color:var(--deep-brown); margin-bottom:20px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:linear-gradient(to right,var(--sand),transparent); }

  /* ── COMPOSER ── */
  .composer {
    background:var(--warm-white); border:1.5px solid var(--sand);
    border-radius:18px; padding:22px; margin-bottom:28px;
    box-shadow:0 4px 24px rgba(139,100,69,0.06);
    animation:fadeUp 0.4s ease both;
  }
  .composer-top { display:flex; gap:12px; align-items:flex-start; margin-bottom:14px; }
  .avatar {
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg,var(--caramel),var(--dusty-rose));
    display:flex; align-items:center; justify-content:center;
    font-size:1rem; flex-shrink:0;
    font-family:'Playfair Display',serif; color:white; font-weight:600;
  }
  textarea {
    width:100%; font-family:'Lora',serif; font-size:0.9rem;
    color:var(--text); background:transparent; border:none; outline:none;
    resize:none; min-height:80px; line-height:1.65; padding-top:6px;
  }
  textarea::placeholder { color:var(--caramel); opacity:0.8; }
  #img-preview-wrap { display:none; margin-bottom:12px; position:relative; }
  #img-preview-wrap img { width:100%; max-height:260px; object-fit:cover; border-radius:12px; border:1.5px solid var(--sand); }
  #remove-img {
    position:absolute; top:8px; right:8px;
    background:rgba(92,61,46,0.75); color:#fff;
    border:none; border-radius:50%; width:26px; height:26px;
    cursor:pointer; font-size:0.8rem;
    display:flex; align-items:center; justify-content:center;
  }
  .mood-bar { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .mood-chip {
    font-size:0.78rem; padding:4px 11px; border-radius:20px;
    border:1.5px solid var(--sand); cursor:pointer; transition:all 0.15s;
    background:transparent; color:var(--text-light); font-family:'Lora',serif;
  }
  .mood-chip.selected { background:var(--caramel); color:white; border-color:var(--caramel); }
  .composer-actions {
    display:flex; align-items:center; justify-content:space-between;
    border-top:1px solid var(--sand); padding-top:12px; margin-top:4px;
  }
  .icon-btn {
    background:none; border:1.5px solid var(--sand); border-radius:10px;
    padding:6px 12px; font-size:0.8rem; cursor:pointer; color:var(--text-light);
    transition:all 0.2s; display:flex; align-items:center; gap:5px; font-family:'Lora',serif;
  }
  .icon-btn:hover { background:var(--sand); color:var(--deep-brown); }
  .post-btn {
    background:linear-gradient(135deg,var(--caramel),var(--brown));
    color:white; border:none; border-radius:10px; padding:8px 22px;
    font-family:'Lora',serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s;
  }
  .post-btn:hover { opacity:0.88; transform:translateY(-1px); }

  /* ── FEED ── */
  .post-card {
    background:var(--warm-white); border:1.5px solid var(--sand);
    border-radius:18px; margin-bottom:20px; overflow:hidden;
    box-shadow:0 2px 16px rgba(139,100,69,0.05);
    animation:fadeUp 0.4s ease both;
  }
  .post-header { display:flex; align-items:center; gap:12px; padding:16px 20px 10px; }
  .post-author strong { font-family:'Playfair Display',serif; font-size:0.95rem; color:var(--deep-brown); display:block; }
  .post-meta { font-size:0.72rem; color:var(--text-light); display:flex; gap:8px; align-items:center; }
  .mood-tag { background:var(--sand); padding:2px 8px; border-radius:20px; font-size:0.7rem; color:var(--brown); }
  .post-image { width:100%; max-height:340px; object-fit:cover; }
  .post-text { padding:14px 20px; font-size:0.9rem; line-height:1.7; }
  .post-reactions { padding:8px 20px 0; display:flex; gap:6px; flex-wrap:wrap; }
  .react-btn {
    background:none; border:1.5px solid var(--sand); border-radius:20px;
    padding:4px 12px; font-size:0.8rem; cursor:pointer; transition:all 0.15s;
    display:flex; align-items:center; gap:4px; color:var(--text-light); font-family:'Lora',serif;
  }
  .react-btn:hover { background:var(--sand); }
  .react-btn.reacted { background:#fff0e0; border-color:var(--caramel); color:var(--brown); }
  .react-count { font-size:0.75rem; }
  .comments-section { padding:10px 20px 16px; border-top:1px solid var(--sand); margin-top:12px; }
  .comment-list { margin-bottom:10px; }
  .comment-item { display:flex; gap:9px; margin-bottom:10px; animation:fadeUp 0.25s ease both; }
  .comment-bubble { background:var(--cream); border:1px solid var(--sand); border-radius:12px; padding:8px 12px; flex:1; }
  .comment-bubble strong { font-family:'Playfair Display',serif; font-size:0.8rem; color:var(--deep-brown); display:block; margin-bottom:2px; }
  .comment-bubble p { font-size:0.82rem; color:var(--text); line-height:1.5; }
  .comment-bubble .c-time { font-size:0.68rem; color:var(--text-light); margin-top:3px; }
  .comment-input-row { display:flex; gap:8px; align-items:center; }
  .comment-input {
    flex:1; font-family:'Lora',serif; font-size:0.82rem;
    border:1.5px solid var(--sand); border-radius:20px;
    padding:7px 14px; background:var(--cream); outline:none; color:var(--text);
  }
  .comment-input::placeholder { color:var(--caramel); opacity:0.8; }
  .send-btn {
    background:var(--caramel); color:white; border:none; border-radius:50%;
    width:32px; height:32px; cursor:pointer; font-size:1rem; transition:all 0.15s; flex-shrink:0;
  }
  .send-btn:hover { background:var(--brown); transform:scale(1.08); }

  /* ── CHAT ── */
  #chat-page { display:none; }
  .chat-wrap {
    background:var(--warm-white); border:1.5px solid var(--sand);
    border-radius:18px; overflow:hidden; display:flex; flex-direction:column;
    height:520px; box-shadow:0 4px 24px rgba(139,100,69,0.07);
  }
  .chat-header {
    background:linear-gradient(135deg,var(--sand),var(--cream));
    padding:14px 20px; border-bottom:1px solid var(--sand);
    font-family:'Playfair Display',serif; font-size:1rem; color:var(--deep-brown);
  }
  .chat-messages {
    flex:1; overflow-y:auto; padding:16px 20px;
    display:flex; flex-direction:column; gap:10px; background:var(--cream);
  }
  .chat-messages::-webkit-scrollbar { width:4px; }
  .chat-messages::-webkit-scrollbar-thumb { background:var(--sand); border-radius:4px; }
  .msg-row { display:flex; gap:8px; align-items:flex-end; animation:fadeUp 0.2s ease both; }
  .msg-row.mine { flex-direction:row-reverse; }
  .msg-bubble {
    max-width:68%; background:var(--warm-white); border:1.5px solid var(--sand);
    border-radius:16px 16px 16px 4px; padding:9px 14px;
  }
  .msg-row.mine .msg-bubble {
    background:linear-gradient(135deg,var(--caramel),var(--brown));
    color:white; border:none; border-radius:16px 16px 4px 16px;
  }
  .msg-sender { font-size:0.68rem; font-family:'Playfair Display',serif; color:var(--text-light); margin-bottom:2px; }
  .msg-text { font-size:0.85rem; line-height:1.5; }
  .msg-time { font-size:0.65rem; opacity:0.6; margin-top:3px; }
  .chat-input-bar { display:flex; gap:10px; padding:14px 20px; border-top:1px solid var(--sand); background:var(--warm-white); align-items:center; }
  .chat-input {
    flex:1; font-family:'Lora',serif; font-size:0.88rem;
    border:1.5px solid var(--sand); border-radius:22px;
    padding:9px 16px; background:var(--cream); outline:none; color:var(--text);
  }
  .chat-input::placeholder { color:var(--caramel); opacity:0.8; }
  .chat-send {
    background:linear-gradient(135deg,var(--caramel),var(--brown));
    color:white; border:none; border-radius:50%; width:38px; height:38px;
    cursor:pointer; font-size:1.1rem; transition:all 0.15s;
    display:flex; align-items:center; justify-content:center;
  }
  .chat-send:hover { opacity:0.85; transform:scale(1.08); }

  /* ── MEMORIES ── */
  #memories-page { display:none; }
  .memory-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  .memory-tile {
    border-radius:14px; overflow:hidden; aspect-ratio:1; position:relative;
    border:1.5px solid var(--sand); background:var(--sand); transition:transform 0.2s;
  }
  .memory-tile:hover { transform:scale(1.025); }
  .memory-tile img { width:100%; height:100%; object-fit:cover; }
  .tile-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top,rgba(92,61,46,0.6),transparent 55%);
    display:flex; align-items:flex-end; padding:12px;
  }
  .tile-info strong { font-family:'Playfair Display',serif; font-size:0.85rem; display:block; color:white; }
  .tile-info span { font-size:0.7rem; opacity:0.85; color:white; }

  /* ── MISC ── */
  .loading-post { text-align:center; padding:30px; color:var(--text-light); font-style:italic; font-size:0.85rem; }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-light); font-style:italic; font-size:0.9rem; }
  .empty-state .big { font-size:2rem; margin-bottom:8px; }
  #img-input { display:none; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  #toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(60px);
    background:var(--deep-brown); color:#fff; padding:10px 22px; border-radius:22px;
    font-size:0.82rem; font-family:'Lora',serif; transition:transform 0.3s ease;
    z-index:9999; pointer-events:none;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }
  @media(max-width:480px) {
    header { padding:12px 16px; }
    main { padding:20px 14px 80px; }
    .memory-grid { gap:10px; }
  }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="flower">🌻</div>
    <h2>Our Little World</h2>
    <p>Enter your name and room to join your world.</p>
    <div class="login-field">
      <label>Your Name</label>
      <input id="login-name" placeholder="e.g. Lea" maxlength="24" onkeydown="loginKeydown(event)"/>
    </div>
    <div class="login-field">
      <label>Room</label>
      <input id="login-room" placeholder="e.g. sunflower" maxlength="32" onkeydown="loginKeydown(event)"/>
    </div>
    <button class="login-btn" onclick="enterWorld()">Enter World 🌿</button>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="logo">Our Little <span>World</span> 🌻</div>
  <nav>
    <button class="active" onclick="showPage('feed',this)">Feed</button>
    <button onclick="showPage('chat',this)">Chat</button>
    <button onclick="showPage('memories',this)">Memories</button>
  </nav>
</header>

<!-- ── USER BAR ── -->
<div id="user-bar">
  <span>👋 <strong id="bar-name"></strong></span>
  <span class="room-badge" id="bar-room"></span>
  <div id="live-badge"><div class="dot"></div> Live</div>
</div>

<main>
  <!-- FEED -->
  <div id="feed-page">
    <div class="composer" id="composer">
      <div class="composer-top">
        <div class="avatar" id="composer-avatar">?</div>
        <textarea id="post-text" placeholder="How's your day going? Share something…" rows="3"></textarea>
      </div>
      <div id="img-preview-wrap">
        <img id="img-preview" src="" alt="preview"/>
        <button id="remove-img" onclick="removeImage()">✕</button>
      </div>
      <div class="mood-bar">
        <span style="font-size:0.78rem;color:var(--text-light);align-self:center;">Mood:</span>
        <button class="mood-chip" onclick="selectMood(this,'☀️ happy')">☀️ happy</button>
        <button class="mood-chip" onclick="selectMood(this,'🌧️ rainy day')">🌧️ rainy day</button>
        <button class="mood-chip" onclick="selectMood(this,'😌 peaceful')">😌 peaceful</button>
        <button class="mood-chip" onclick="selectMood(this,'🥰 grateful')">🥰 grateful</button>
        <button class="mood-chip" onclick="selectMood(this,'😂 funny')">😂 funny</button>
        <button class="mood-chip" onclick="selectMood(this,'😴 sleepy')">😴 sleepy</button>
      </div>
      <div class="composer-actions">
        <button class="icon-btn" onclick="document.getElementById('img-input').click()">📷 Photo</button>
        <button class="post-btn" onclick="submitPost()">Post ✦</button>
      </div>
    </div>
    <input type="file" id="img-input" accept="image/*" onchange="previewImage(event)"/>
    <div class="section-label">Recent Moments</div>
    <div id="feed-list"><div class="loading-post">Loading moments… 🌿</div></div>
  </div>

  <!-- CHAT -->
  <div id="chat-page">
    <div class="section-label">Group Chat 💬</div>
    <div class="chat-wrap">
      <div class="chat-header" id="chat-header">🌻 Our Little World — Group Chat</div>
      <div class="chat-messages" id="chat-messages"><div class="loading-post">Loading chat… 🌿</div></div>
      <div class="chat-input-bar">
        <input class="chat-input" id="chat-input" placeholder="Say something warm…" onkeydown="chatKeydown(event)"/>
        <button class="chat-send" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>

  <!-- MEMORIES -->
  <div id="memories-page">
    <div class="section-label">Photo Memories 📷</div>
    <div class="memory-grid" id="memory-grid">
      <div class="empty-state" style="grid-column:1/-1"><div class="big">🌼</div>Post photos in the feed and they'll appear here!</div>
    </div>
  </div>
</main>

<div id="toast"></div>

<!-- ── FIREBASE SDK ── -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  orderBy, query, where, doc, updateDoc, serverTimestamp, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// ── HARDCODED FIREBASE CONFIG ──────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCfTULj7GNWBz95u0qMB47FGLw6PGZcb54",
  authDomain: "kupals-3fff5.firebaseapp.com",
  projectId: "kupals-3fff5",
  storageBucket: "kupals-3fff5.appspot.com",
  messagingSenderId: "514799395666",
  appId: "1:514799395666:web:f4dc27142ac6c962a5508b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);



// ── STATE ──────────────────────────────────────────────────
let currentUser = '', currentRoom = '';
let selectedMood = '', pendingImageData = null;
let postsUnsub = null, chatUnsub = null;
let postsCache = [], chatCache = [];

const REACTIONS = ['❤️','😂','😮','🥰','👏'];
const AVATAR_COLORS = [
  'linear-gradient(135deg,#8b6445,#c8a97e)',
  'linear-gradient(135deg,#d4a5a5,#c8a97e)',
  'linear-gradient(135deg,#9aab89,#c8a97e)',
  'linear-gradient(135deg,#c9a84c,#8b6445)',
  'linear-gradient(135deg,#5c3d2e,#8b6445)',
  'linear-gradient(135deg,#d4a5a5,#9aab89)'
];
function avatarColor(name) {
  let h=0; for(let c of name) h+=c.charCodeAt(0);
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function avatarEl(name, size=38) {
  const letter = name ? name[0].toUpperCase() : '?';
  const bg = avatarColor(name||'?');
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${size>30?'1rem':'0.7rem'};flex-shrink:0">${letter}</div>`;
}
function timeStr() {
  return new Date().toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function escHtml(s='') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── EXPOSE GLOBALS ─────────────────────────────────────────
window.loginKeydown  = loginKeydown;
window.enterWorld    = enterWorld;
window.showPage      = showPage;
window.selectMood    = selectMood;
window.previewImage  = previewImage;
window.removeImage   = removeImage;
window.submitPost    = submitPost;
window.react         = react;
window.addComment    = addComment;
window.commentKeydown= commentKeydown;
window.sendChat      = sendChat;
window.chatKeydown   = chatKeydown;

// ── LOGIN ──────────────────────────────────────────────────
function loginKeydown(e){ if(e.key==='Enter') enterWorld(); }

function enterWorld() {
  const name = document.getElementById('login-name').value.trim();
  const room = document.getElementById('login-room').value.trim();
  if(!name || !room){ showToast('Please fill in both fields 🌿'); return; }

  currentUser = name;
  currentRoom = room.toLowerCase().replace(/\s+/g,'-');

  // Persist for reload
  localStorage.setItem('olw_name', currentUser);
  localStorage.setItem('olw_room', currentRoom);

  applyIdentity();
  document.getElementById('login-screen').style.display = 'none';
  subscribeToFeed();
  subscribeToChat();
  showToast(`Welcome, ${currentUser}! 🌻`);
}

function applyIdentity() {
  document.getElementById('bar-name').textContent = currentUser;
  document.getElementById('bar-room').textContent = '# ' + currentRoom;
  document.getElementById('chat-header').textContent = `🌻 ${currentRoom} — Group Chat`;
  const av = document.getElementById('composer-avatar');
  av.textContent = currentUser[0].toUpperCase();
  av.style.background = avatarColor(currentUser);
}

// Auto-restore session
(function restoreSession(){
  const n = localStorage.getItem('olw_name');
  const r = localStorage.getItem('olw_room');
  if(n && r){
    document.getElementById('login-name').value = n;
    document.getElementById('login-room').value = r;
  }
})();

// ── PAGE NAV ───────────────────────────────────────────────
function showPage(page, btn) {
  ['feed','chat','memories'].forEach(p => {
    document.getElementById(p+'-page').style.display = p===page ? 'block' : 'none';
  });
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(page==='chat') scrollChatBottom();
  if(page==='memories') renderMemories();
}

// ── MOOD ───────────────────────────────────────────────────
function selectMood(el, mood) {
  document.querySelectorAll('.mood-chip').forEach(c=>c.classList.remove('selected'));
  selectedMood = selectedMood===mood ? '' : mood;
  if(selectedMood) el.classList.add('selected');
}

// ── IMAGE ──────────────────────────────────────────────────
function previewImage(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 900;
      let w=img.width, h=img.height;
      if(w>MAX){h=h*(MAX/w);w=MAX;}
      if(h>MAX){w=w*(MAX/h);h=MAX;}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingImageData = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('img-preview').src = pendingImageData;
      document.getElementById('img-preview-wrap').style.display = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function removeImage() {
  pendingImageData = null;
  document.getElementById('img-preview-wrap').style.display='none';
  document.getElementById('img-preview').src='';
  document.getElementById('img-input').value='';
}

// ── POST ───────────────────────────────────────────────────
async function submitPost() {
  if(!currentUser){ showToast('Enter the world first! 🌿'); return; }
  const text = document.getElementById('post-text').value.trim();
  if(!text && !pendingImageData){ showToast('Write something or add a photo ✦'); return; }

  const btn = document.querySelector('.post-btn');
  btn.textContent='Posting…'; btn.disabled=true;

  let imageUrl = null;
  if(pendingImageData) {
    imageUrl = pendingImageData; // DIRECT SAVE (no storage)
  }

  try {
    await addDoc(collection(db,'posts'), {
      author: currentUser,
      room: currentRoom,
      text,
      imageUrl,
      mood: selectedMood,
      time: timeStr(),
      createdAt: serverTimestamp(),
      reactions: {},
      comments: []
    });
    document.getElementById('post-text').value='';
    removeImage();
    selectedMood='';
    document.querySelectorAll('.mood-chip').forEach(c=>c.classList.remove('selected'));
    showToast('Posted! 🌻');
  } catch(e) {
    showToast('Failed to post: ' + e.message);
  }
  btn.textContent='Post ✦'; btn.disabled=false;
}

// ── FEED SUBSCRIPTION ──────────────────────────────────────
function subscribeToFeed() {
  if(postsUnsub) postsUnsub();
  const q = query(
    collection(db,'posts'),
    where('room','==',currentRoom),
    orderBy('createdAt','desc'),
    limit(40)
  );
  postsUnsub = onSnapshot(q, snap => {
    postsCache = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderFeed();
  }, err => {
    document.getElementById('feed-list').innerHTML =
      `<div class="empty-state"><div class="big">⚠️</div>Feed error: ${err.message}</div>`;
  });
}

function renderFeed() {
  const list = document.getElementById('feed-list');
  if(!postsCache.length){
    list.innerHTML=`<div class="empty-state"><div class="big">🌿</div>No posts yet — be the first to share your day!</div>`;
    return;
  }
  list.innerHTML = postsCache.map(p=>postHTML(p)).join('');
}

function postHTML(p) {
  const reactions = p.reactions || {};
  const reactHTML = REACTIONS.map(r=>{
    const users = reactions[r] || [];
    const reacted = currentUser && users.includes(currentUser);
    return `<button class="react-btn ${reacted?'reacted':''}" onclick="react('${p.id}','${r}')">
      ${r}<span class="react-count">${users.length||''}</span>
    </button>`;
  }).join('');

  const comments = p.comments || [];
  const commentsHTML = comments.map(c=>`
    <div class="comment-item">
      ${avatarEl(c.author,28)}
      <div class="comment-bubble">
        <strong>${escHtml(c.author)}</strong>
        <p>${escHtml(c.text)}</p>
        <div class="c-time">${c.time}</div>
      </div>
    </div>`).join('');

  return `<div class="post-card" id="post-${p.id}">
    <div class="post-header">
      ${avatarEl(p.author)}
      <div class="post-author">
        <strong>${escHtml(p.author)}</strong>
        <div class="post-meta">
          ${p.time||''}
          ${p.mood?`<span class="mood-tag">${p.mood}</span>`:''}
        </div>
      </div>
    </div>
    ${p.imageUrl?`<img class="post-image" src="${p.imageUrl}" alt="post"/>` :''}
    ${p.text?`<div class="post-text">${escHtml(p.text)}</div>`:''}
    <div class="post-reactions">${reactHTML}</div>
    <div class="comments-section">
      <div class="comment-list">${commentsHTML}</div>
      <div class="comment-input-row">
        <input class="comment-input" id="cinput-${p.id}" placeholder="Leave a warm message…" onkeydown="commentKeydown(event,'${p.id}')"/>
        <button class="send-btn" onclick="addComment('${p.id}')">➤</button>
      </div>
    </div>
  </div>`;
}

// ── REACT ──────────────────────────────────────────────────
async function react(postId, emoji) {
  if(!currentUser){ showToast('Enter the world first!'); return; }
  const post = postsCache.find(p=>p.id===postId); if(!post) return;
  const reactions = {...(post.reactions||{})};
  const users = [...(reactions[emoji]||[])];
  const idx = users.indexOf(currentUser);
  if(idx>-1) users.splice(idx,1); else users.push(currentUser);
  reactions[emoji] = users;
  await updateDoc(doc(db,'posts',postId),{reactions});
}

// ── COMMENT ────────────────────────────────────────────────
function commentKeydown(e,postId){ if(e.key==='Enter') addComment(postId); }
async function addComment(postId) {
  if(!currentUser){ showToast('Enter the world first!'); return; }
  const input = document.getElementById(`cinput-${postId}`);
  const text = input.value.trim(); if(!text) return;
  const post = postsCache.find(p=>p.id===postId); if(!post) return;
  const comments = [...(post.comments||[]),{author:currentUser,text,time:timeStr()}];
  await updateDoc(doc(db,'posts',postId),{comments});
  input.value='';
}

// ── CHAT ───────────────────────────────────────────────────
function subscribeToChat() {
  if(chatUnsub) chatUnsub();
  const q = query(
    collection(db,'chat'),
    where('room','==',currentRoom),
    orderBy('createdAt','asc'),
    limit(100)
  );
  chatUnsub = onSnapshot(q, snap => {
    chatCache = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderChat();
  });
}
function renderChat() {
  const box = document.getElementById('chat-messages');
  if(!chatCache.length){
    box.innerHTML=`<div class="empty-state"><div class="big">💬</div>No messages yet — say hi!</div>`;
    return;
  }
  box.innerHTML = chatCache.map(m=>{
    const mine = m.author===currentUser;
    return `<div class="msg-row ${mine?'mine':''}">
      ${!mine?avatarEl(m.author,30):''}
      <div>
        ${!mine?`<div class="msg-sender">${escHtml(m.author)}</div>`:''}
        <div class="msg-bubble">
          <div class="msg-text">${escHtml(m.text)}</div>
          <div class="msg-time">${m.time||''}</div>
        </div>
      </div>
      ${mine?avatarEl(m.author,30):''}
    </div>`;
  }).join('');
  scrollChatBottom();
}
function chatKeydown(e){ if(e.key==='Enter') sendChat(); }
async function sendChat() {
  if(!currentUser){ showToast('Enter the world first!'); return; }
  const input = document.getElementById('chat-input');
  const text = input.value.trim(); if(!text) return;
  input.value='';
  await addDoc(collection(db,'chat'),{
    author: currentUser, room: currentRoom, text, time: timeStr(), createdAt: serverTimestamp()
  });
}
function scrollChatBottom() {
  setTimeout(()=>{
    const box = document.getElementById('chat-messages');
    box.scrollTop = box.scrollHeight;
  },80);
}

// ── MEMORIES ───────────────────────────────────────────────
function renderMemories() {
  const grid = document.getElementById('memory-grid');
  const photos = postsCache.filter(p=>p.imageUrl);
  if(!photos.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="big">🌼</div>Post some photos in the feed and they'll appear here!</div>`;
    return;
  }
  grid.innerHTML = photos.map(p=>`
    <div class="memory-tile">
      <img src="${p.imageUrl}" alt="memory"/>
      <div class="tile-overlay">
        <div class="tile-info">
          <strong>${escHtml(p.author)}</strong>
          <span>${p.time||''}</span>
        </div>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
